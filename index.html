<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>aiho7</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div class="container">
    <!-- Sidebar Chat -->
    <div class="chat-sidebar">
      <h1 class="logo">aiho7</h1>
      <div class="chat-box" id="chatBox"></div>
      <form id="chatForm">
        <input type="text" id="chatPrompt" placeholder="Tulis pertanyaan 18+..." required/>
        <button type="submit">Kirim</button>
      </form>
    </div>

    <!-- Main Content (Image Generator) -->
    <div class="image-main">
      <h2>Image Generator NSFW</h2>
      <form id="imageForm">
        <textarea id="imagePrompt" placeholder="Prompt untuk gambar telanjang (misal: 'seorang wanita berambut merah, pose sensual, studio foto')" required></textarea>
        <button type="submit">Buat Gambar</button>
      </form>
      <div class="image-result" id="imageResult"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
